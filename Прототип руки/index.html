<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изометрическая рука — Прототип</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; cursor: none; }
        canvas { display: block; }
        #ui {
            position: fixed; top: 16px; left: 16px;
            color: #aab; font-family: monospace; font-size: 14px;
            pointer-events: none; user-select: none;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>ЛКМ — схватить/бросить | Тяни на пустом месте — выделить миньонов</div>
        <div id="status">Рука открыта</div>
    </div>
    <canvas id="game"></canvas>
    <script>
    // ============================================================
    //  ИЗОМЕТРИЧЕСКИЙ ПРОТОТИП РУКИ — Pixel Art + Физика
    // ============================================================

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    // — Размеры —
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Пиксельный рендер (без сглаживания)
    ctx.imageSmoothingEnabled = false;

    // ============================================================
    //  ИЗОМЕТРИЧЕСКАЯ ПРОЕКЦИЯ
    // ============================================================
    const ISO_ANGLE = Math.PI / 4; // 45 градусов
    const TILE_W = 64;
    const TILE_H = Math.round(TILE_W * Math.sin(ISO_ANGLE)); // ~45px при 45°
    const PIXEL_SCALE = 3; // масштаб пикселей для pixel-art

    // ============================================================
    //  ФИЗИЧЕСКИЕ КОНСТАНТЫ
    // ============================================================
    const GRAVITY        = 8.0;   // ед/с² вниз
    const CARRY_HEIGHT   = 1.5;   // высота переноса (мировые единицы)
    const LIFT_SPEED     = 4.0;   // скорость подъёма
    const THROW_VZ_BASE  = 3.0;   // базовый вертикальный импульс при броске
    const THROW_SCALE    = 1.5;   // множитель скорости руки → скорость броска
    const BOUNCE_MIN_VZ  = 0.3;   // минимальный vz для отскока
    const MAX_BOUNCES    = 5;     // максимум отскоков
    const SLIDE_STOP     = 0.05;  // порог остановки скольжения
    const HEIGHT_TO_SCREEN = 40;  // пикселей на единицу высоты
    const VELOCITY_HISTORY = 10;  // кадров для усреднения скорости
    const MAX_THROW_SPEED = 8.0;  // максимальная скорость броска (iso ед/с)
    const GRID_SIZE       = 10;   // граница сетки (iso координаты)
    const WALL_BOUNCE     = 0.6;  // коэффициент отскока от стен
    const CAMERA_OFFSET_Y = 40;   // вертикальное смещение центра мира (px)
    const AIR_RESISTANCE  = 0.99; // коэффициент сопротивления воздуха (за 1/60 сек)
    const MINION_SPEED    = 1.5;  // скорость блуждания миньона (iso ед/с)

    function isoToScreen(ix, iy) {
        return {
            x: (ix - iy) * (TILE_W / 2),
            y: (ix + iy) * (TILE_H / 2)
        };
    }

    function screenToIso(sx, sy) {
        // Учитываем зум камеры: экранные координаты → мировые
        const cx = (sx - canvas.width / 2) / camera.zoom;
        const cy = (sy - canvas.height / 2) / camera.zoom + CAMERA_OFFSET_Y;
        return {
            x: (cx / (TILE_W / 2) + cy / (TILE_H / 2)) / 2,
            y: (cy / (TILE_H / 2) - cx / (TILE_W / 2)) / 2
        };
    }

    function worldToScreen(wx, wy) {
        const iso = isoToScreen(wx, wy);
        return {
            x: iso.x + canvas.width / 2,
            y: iso.y + canvas.height / 2 - CAMERA_OFFSET_Y
        };
    }

    // ============================================================
    //  РИСОВАНИЕ ПИКСЕЛЕЙ
    // ============================================================
    function drawPixel(x, y, color, scale = PIXEL_SCALE) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.floor(x), Math.floor(y), scale, scale);
    }

    function drawPixelArt(screenX, screenY, pixels, scale = PIXEL_SCALE) {
        for (const p of pixels) {
            drawPixel(
                screenX + p[0] * scale,
                screenY + p[1] * scale,
                p[2],
                scale
            );
        }
    }

    // ============================================================
    //  ИЗОМЕТРИЧЕСКАЯ СЕТКА (ПОЛ)
    // ============================================================
    function drawFloor() {
        for (let iy = -GRID_SIZE; iy <= GRID_SIZE; iy++) {
            for (let ix = -GRID_SIZE; ix <= GRID_SIZE; ix++) {
                const s = worldToScreen(ix, iy);
                const isEven = (ix + iy) % 2 === 0;
                drawIsoDiamond(s.x, s.y, isEven ? '#2a2a4a' : '#252545', isEven ? '#222240' : '#1e1e3a');
            }
        }
    }

    function drawIsoDiamond(cx, cy, fillColor, strokeColor) {
        ctx.beginPath();
        ctx.moveTo(cx, cy - TILE_H / 2);
        ctx.lineTo(cx + TILE_W / 2, cy);
        ctx.lineTo(cx, cy + TILE_H / 2);
        ctx.lineTo(cx - TILE_W / 2, cy);
        ctx.closePath();
        ctx.fillStyle = fillColor;
        ctx.fill();
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // ============================================================

    // ============================================================

    // ============================================================
    //  ФИЗИКА БРОСАНИЯ
    // ============================================================
    function calculateThrowVelocity(itemType) {
        const history = hand.velocityHistory;
        if (history.length === 0) return { vx: 0, vy: 0, vz: THROW_VZ_BASE };

        let totalWeight = 0;
        let avgVx = 0;
        let avgVy = 0;

        for (let i = 0; i < history.length; i++) {
            const weight = (i + 1);
            avgVx += history[i].vx * weight;
            avgVy += history[i].vy * weight;
            totalWeight += weight;
        }

        avgVx /= totalWeight;
        avgVy /= totalWeight;

        const massScale = 1.0 / Math.sqrt(itemType.mass);
        const speed = Math.sqrt(avgVx * avgVx + avgVy * avgVy);

        let tvx = avgVx * THROW_SCALE * massScale;
        let tvy = avgVy * THROW_SCALE * massScale;
        let tvz = THROW_VZ_BASE * massScale + speed * 0.3;

        // Ограничиваем максимальную скорость
        const tSpeed = Math.sqrt(tvx * tvx + tvy * tvy);
        if (tSpeed > MAX_THROW_SPEED) {
            const scale = MAX_THROW_SPEED / tSpeed;
            tvx *= scale;
            tvy *= scale;
        }

        return { vx: tvx, vy: tvy, vz: Math.min(tvz, MAX_THROW_SPEED) };
    }

    function triggerScreenShake(intensity) {
        screenShake.intensity = Math.min(intensity, 15);
    }

    function updateScreenShake(dt) {
        if (screenShake.intensity > 0.1) {
            screenShake.offsetX = (Math.random() - 0.5) * screenShake.intensity * 2;
            screenShake.offsetY = (Math.random() - 0.5) * screenShake.intensity * 2;
            screenShake.intensity *= Math.pow(0.01, dt);
        } else {
            screenShake.intensity = 0;
            screenShake.offsetX = 0;
            screenShake.offsetY = 0;
        }
    }

    // ============================================================
    //  ГРАНИЦЫ КАРТЫ
    // ============================================================
    function clampToGrid(item) {
        const limit = GRID_SIZE + 0.5; // чуть за краем тайлов
        if (item.ix < -limit) {
            item.ix = -limit;
            item.vx = Math.abs(item.vx) * WALL_BOUNCE;
        } else if (item.ix > limit) {
            item.ix = limit;
            item.vx = -Math.abs(item.vx) * WALL_BOUNCE;
        }
        if (item.iy < -limit) {
            item.iy = -limit;
            item.vy = Math.abs(item.vy) * WALL_BOUNCE;
        } else if (item.iy > limit) {
            item.iy = limit;
            item.vy = -Math.abs(item.vy) * WALL_BOUNCE;
        }
    }

    // ============================================================
    //  СТЕЙТ-МАШИНА ПРЕДМЕТОВ
    // ============================================================
    function updateItemPhysics(item, dt) {
        const type = ITEM_TYPES[item.type];
        item.stateTime += dt;

        switch (item.state) {
            case 'idle':
                item.iz = 0;
                item.vx = 0;
                item.vy = 0;
                item.vz = 0;
                break;

            case 'lifting': {
                item.liftProgress += LIFT_SPEED * dt;
                if (item.liftProgress >= 1.0) {
                    item.liftProgress = 1.0;
                    item.state = 'carried';
                    item.stateTime = 0;
                }
                const t = 1 - Math.pow(1 - item.liftProgress, 2);
                item.iz = t * CARRY_HEIGHT;
                item.ix += (hand.isoX - item.ix) * Math.min(1, dt * 10);
                item.iy += (hand.isoY - item.iy) * Math.min(1, dt * 10);
                break;
            }

            case 'carried':
                item.ix = hand.isoX;
                item.iy = hand.isoY;
                item.iz = CARRY_HEIGHT;
                break;

            case 'thrown':
            case 'bouncing':
                item.vz -= GRAVITY * dt;
                item.ix += item.vx * dt;
                item.iy += item.vy * dt;
                item.iz += item.vz * dt;

                // Лёгкое сопротивление воздуха (frame-rate независимо)
                const airFactor = Math.pow(AIR_RESISTANCE, dt * 60);
                item.vx *= airFactor;
                item.vy *= airFactor;

                // Отскок от стен
                clampToGrid(item);

                if (item.iz <= 0) {
                    item.iz = 0;

                    if (Math.abs(item.vz) > BOUNCE_MIN_VZ && item.bounceCount < MAX_BOUNCES) {
                        // Отскок
                        if (item.bounceCount === 0) {
                            triggerScreenShake(type.mass * Math.abs(item.vz) * 0.5);
                        }
                        item.vz = -item.vz * type.bounciness;
                        item.vx *= type.friction;
                        item.vy *= type.friction;
                        item.bounceCount++;
                        item.state = 'bouncing';
                        item.stateTime = 0;
                    } else {
                        item.vz = 0;
                        item.iz = 0;
                        const hSpeed = Math.sqrt(item.vx * item.vx + item.vy * item.vy);
                        if (hSpeed > SLIDE_STOP) {
                            item.state = 'sliding';
                        } else {
                            item.vx = 0;
                            item.vy = 0;
                            item.state = 'settling';
                        }
                        item.stateTime = 0;
                    }
                }
                break;

            case 'sliding':
                item.iz = 0;
                item.vz = 0;

                const frictionFactor = Math.pow(type.friction, dt * 5);
                item.vx *= frictionFactor;
                item.vy *= frictionFactor;

                item.ix += item.vx * dt;
                item.iy += item.vy * dt;

                // Отскок от стен
                clampToGrid(item);

                const hSpeed = Math.sqrt(item.vx * item.vx + item.vy * item.vy);
                if (hSpeed < SLIDE_STOP) {
                    item.vx = 0;
                    item.vy = 0;
                    item.state = 'settling';
                    item.stateTime = 0;
                }
                break;

            case 'settling':
                if (item.stateTime > 0.15) {
                    item.state = 'idle';
                    item.stateTime = 0;
                    item.bounceCount = 0;
                    item.grabbed = false;
                }
                break;
        }
    }

    // ============================================================
    //  ФИЗИКА И AI МИНЬОНОВ
    // ============================================================
    function updateMinion(minion, dt) {
        minion.stateTime += dt;

        switch (minion.state) {
            case 'wandering': {
                const flagActive = flag.state === 'placed';
                const tx = flagActive ? flag.ix : minion.targetX;
                const ty = flagActive ? flag.iy : minion.targetY;
                const dx = tx - minion.ix;
                const dy = ty - minion.iy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 0.25) {
                    if (!flagActive) {
                        // Обычное блуждание: пауза и новая точка
                        minion.state = 'paused';
                        minion.pauseDuration = 0.5 + Math.random() * 1.5;
                        minion.stateTime = 0;
                    }
                    // Если флаг стоит — стоим на месте
                } else {
                    const spd = MINION_SPEED * dt;
                    minion.ix += (dx / dist) * spd;
                    minion.iy += (dy / dist) * spd;
                    const lim = GRID_SIZE - 0.5;
                    minion.ix = Math.max(-lim, Math.min(lim, minion.ix));
                    minion.iy = Math.max(-lim, Math.min(lim, minion.iy));
                }
                break;
            }

            case 'paused':
                if (minion.stateTime > minion.pauseDuration) {
                    pickNewMinionTarget(minion);
                    minion.state = 'wandering';
                    minion.stateTime = 0;
                }
                break;

            case 'lifting': {
                minion.liftProgress += LIFT_SPEED * dt;
                if (minion.liftProgress >= 1.0) {
                    minion.liftProgress = 1.0;
                    minion.state = 'carried';
                    minion.stateTime = 0;
                }
                const t = 1 - Math.pow(1 - minion.liftProgress, 2);
                minion.iz = t * CARRY_HEIGHT;
                minion.ix += (hand.isoX - minion.ix) * Math.min(1, dt * 10);
                minion.iy += (hand.isoY - minion.iy) * Math.min(1, dt * 10);
                break;
            }

            case 'carried':
                minion.ix = hand.isoX;
                minion.iy = hand.isoY;
                minion.iz = CARRY_HEIGHT;
                break;

            case 'thrown':
            case 'bouncing': {
                minion.vz -= GRAVITY * dt;
                minion.ix += minion.vx * dt;
                minion.iy += minion.vy * dt;
                minion.iz += minion.vz * dt;
                const airFactor = Math.pow(AIR_RESISTANCE, dt * 60);
                minion.vx *= airFactor;
                minion.vy *= airFactor;
                clampToGrid(minion);
                if (minion.iz <= 0) {
                    minion.iz = 0;
                    if (Math.abs(minion.vz) > BOUNCE_MIN_VZ && minion.bounceCount < MAX_BOUNCES) {
                        if (minion.bounceCount === 0) {
                            triggerScreenShake(minion.mass * Math.abs(minion.vz) * 0.5);
                        }
                        minion.vz = -minion.vz * minion.bounciness;
                        minion.vx *= minion.friction;
                        minion.vy *= minion.friction;
                        minion.bounceCount++;
                        minion.state = 'bouncing';
                        minion.stateTime = 0;
                    } else {
                        minion.vz = 0;
                        const hSpeed = Math.sqrt(minion.vx * minion.vx + minion.vy * minion.vy);
                        if (hSpeed > SLIDE_STOP) {
                            minion.state = 'sliding';
                        } else {
                            minion.vx = 0;
                            minion.vy = 0;
                            minion.state = 'settling';
                        }
                        minion.stateTime = 0;
                    }
                }
                break;
            }

            case 'sliding': {
                minion.iz = 0;
                minion.vz = 0;
                const frictionFactor = Math.pow(minion.friction, dt * 5);
                minion.vx *= frictionFactor;
                minion.vy *= frictionFactor;
                minion.ix += minion.vx * dt;
                minion.iy += minion.vy * dt;
                clampToGrid(minion);
                const hSpeed = Math.sqrt(minion.vx * minion.vx + minion.vy * minion.vy);
                if (hSpeed < SLIDE_STOP) {
                    minion.vx = 0;
                    minion.vy = 0;
                    minion.state = 'settling';
                    minion.stateTime = 0;
                }
                break;
            }

            case 'settling':
                if (minion.stateTime > 0.3) {
                    pickNewMinionTarget(minion);
                    minion.state = 'wandering';
                    minion.stateTime = 0;
                    minion.bounceCount = 0;
                }
                break;
        }
    }

    function drawMinion(minion, index) {
        const s = worldToScreen(minion.ix, minion.iy);

        drawItemShadow(s.x, s.y, MINION_W, MINION_H, minion.iz);

        if (minion.state === 'carried' || minion.state === 'lifting') {
            const time = performance.now() / 300;
            const wobbleX = Math.sin(time) * 1.5;
            const wobbleY = Math.cos(time * 1.3) * 1;
            const gripOffsetY = -8;
            const lerpT = minion.state === 'lifting' ? (1 - Math.pow(1 - minion.liftProgress, 2)) : 1;
            const canvasPos = screenToCanvas(hand.screenX, hand.screenY);
            const groundOx = s.x - (MINION_W * PIXEL_SCALE) / 2;
            const groundOy = s.y - (MINION_H * PIXEL_SCALE) - 4;
            const handOx = canvasPos.x - (MINION_W * PIXEL_SCALE) / 2 + wobbleX;
            const handOy = canvasPos.y - (MINION_H * PIXEL_SCALE) / 2 + gripOffsetY + wobbleY;
            const ox = groundOx + (handOx - groundOx) * lerpT;
            const oy = groundOy + (handOy - groundOy) * lerpT;
            drawPixelArt(ox, oy, MINION_PIXELS, PIXEL_SCALE);
            return;
        }

        const heightOffset = minion.iz * HEIGHT_TO_SCREEN;
        const ox = s.x - (MINION_W * PIXEL_SCALE) / 2;
        const oy = s.y - (MINION_H * PIXEL_SCALE) - 4 - heightOffset;

        if (hand.grabbedFlag && hand.selectedMinions.includes(index)) {
            ctx.save();
            const time = performance.now() / 400;
            ctx.globalAlpha = 0.35 + 0.2 * Math.sin(time);
            ctx.strokeStyle = '#44ff88';
            ctx.lineWidth = 2;
            ctx.strokeRect(ox - 5, oy - 5, MINION_W * PIXEL_SCALE + 10, MINION_H * PIXEL_SCALE + 10);
            ctx.restore();
        }

        if (index === hoveredMinion) {
            drawHighlight(ox, oy, MINION_W, MINION_H);
        }

        drawPixelArt(ox, oy, MINION_PIXELS, PIXEL_SCALE);
    }

    // ============================================================
    //  ФЛАГ
    // ============================================================
    function drawFlagAt(sx, sy, isHovered) {
        if (isHovered) {
            ctx.save();
            ctx.globalAlpha = 0.3 + 0.15 * Math.sin(performance.now() / 300);
            ctx.strokeStyle = '#ffff44';
            ctx.lineWidth = 2;
            ctx.strokeRect(sx - 4, sy - 4, FLAG_W * PIXEL_SCALE + 8, FLAG_H * PIXEL_SCALE + 8);
            ctx.restore();
        }
        drawPixelArt(sx, sy, FLAG_PIXELS, PIXEL_SCALE);
    }

    function drawFlagInWorld(isHovered) {
        const s = worldToScreen(flag.ix, flag.iy);
        // Тень на земле
        drawItemShadow(s.x, s.y, FLAG_W, FLAG_H, flag.iz);
        const heightOffset = flag.iz * HEIGHT_TO_SCREEN;
        const ox = s.x - (FLAG_W * PIXEL_SCALE) / 2;
        const oy = s.y - (FLAG_H * PIXEL_SCALE) - 4 - heightOffset;
        drawFlagAt(ox, oy, isHovered);
    }

    // ============================================================
    //  ВСТРЯХИВАНИЕ ФЛАГА
    // ============================================================
    function dismissFlag() {
        const cp = screenToCanvas(hand.screenX, hand.screenY);
        flagEffect.active = true;
        flagEffect.originX = cp.x - (FLAG_W * PIXEL_SCALE) / 2;
        flagEffect.originY = cp.y - (FLAG_H * PIXEL_SCALE) / 2 - 8;
        flagEffect.t = 0;
        flagEffect.particles = FLAG_PIXELS.map(p => ({
            x: p[0] * PIXEL_SCALE,
            y: p[1] * PIXEL_SCALE,
            vx: (Math.random() - 0.5) * 80,
            vy: (Math.random() - 0.5) * 80 - 30,
            color: p[2],
        }));

        flag.state = 'docked';
        hand.grabbedFlag = false;
        hand.state = 'opening';
        hand.animProgress = 0;
        hand.shakeHistory = [];
        hand.selectedMinions = [];

        for (const m of minions) {
            if (m.state === 'wandering' || m.state === 'paused') {
                pickNewMinionTarget(m);
            }
        }

        statusEl.textContent = 'Флаг рассеян!';
    }

    // ============================================================
    //  ВВОД
    // ============================================================
    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        if (selection.active) {
            selection.endX = mouseX;
            selection.endY = mouseY;
        }
    });

    canvas.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        mouseDown = true;
        const handFree = hand.grabbedItem === null && hand.grabbedMinion === null && !hand.grabbedFlag;

        if (hand.grabbedFlag && hoveredItem === null && hoveredMinion === null) {
            // Устанавливаем флаг кликом на свободное место
            flag.ix = hand.isoX;
            flag.iy = hand.isoY;
            flag.iz = 0;
            flag.state = 'placed';
            hand.grabbedFlag = false;
            hand.state = 'opening';
            hand.animProgress = 0;
            hand.velocityHistory = [];
            hand.selectedMinions = [];
            statusEl.textContent = 'Флаг установлен';
        } else if (hoveredItem !== null && handFree) {
            const item = items[hoveredItem];
            if (item.state !== 'carried' && item.state !== 'lifting') {
                hand.grabbedItem = hoveredItem;
                item.grabbed = true;
                item.state = 'lifting';
                item.stateTime = 0;
                item.liftProgress = 0;
                item.vx = 0;
                item.vy = 0;
                item.vz = 0;
                item.bounceCount = 0;
                hand.state = 'closing';
                hand.animProgress = 0;
                hand.velocityHistory = [];
                statusEl.textContent = `Захвачено: ${ITEM_TYPES[item.type].name}`;
            }
        } else if (hoveredMinion !== null && handFree) {
            const minion = minions[hoveredMinion];
            if (minion.state !== 'carried' && minion.state !== 'lifting') {
                hand.grabbedMinion = hoveredMinion;
                minion.state = 'lifting';
                minion.stateTime = 0;
                minion.liftProgress = 0;
                minion.vx = 0;
                minion.vy = 0;
                minion.vz = 0;
                minion.bounceCount = 0;
                hand.state = 'closing';
                hand.animProgress = 0;
                hand.velocityHistory = [];
                statusEl.textContent = 'Захвачено: Миньон';
            }
        } else if (handFree) {
            // Начинаем выделение рамкой — от позиции руки
            selection.active = true;
            selection.startX = hand.screenX;
            selection.startY = hand.screenY;
            selection.endX = mouseX;
            selection.endY = mouseY;
        }
    });

    canvas.addEventListener('mouseup', (e) => {
        if (e.button !== 0) return;
        mouseDown = false;
        if (hand.grabbedItem !== null) {
            const item = items[hand.grabbedItem];
            const type = ITEM_TYPES[item.type];

            item.grabbed = false;
            item.iz = 0;

            const throwVel = calculateThrowVelocity(type);
            item.vx = throwVel.vx;
            item.vy = throwVel.vy;
            item.vz = throwVel.vz;
            item.state = 'thrown';
            item.stateTime = 0;
            item.bounceCount = 0;

            hand.grabbedItem = null;
            hand.state = 'opening';
            hand.animProgress = 0;
            hand.velocityHistory = [];

            const speed = Math.sqrt(throwVel.vx ** 2 + throwVel.vy ** 2);
            if (speed > 2) {
                statusEl.textContent = `Брошено: ${type.name}!`;
            } else {
                statusEl.textContent = `Отпущено: ${type.name}`;
            }
        } else if (hand.grabbedMinion !== null) {
            const minion = minions[hand.grabbedMinion];
            minion.iz = 0;
            const throwVel = calculateThrowVelocity({ mass: minion.mass });
            minion.vx = throwVel.vx;
            minion.vy = throwVel.vy;
            minion.vz = throwVel.vz;
            minion.state = 'thrown';
            minion.stateTime = 0;
            minion.bounceCount = 0;

            hand.grabbedMinion = null;
            hand.state = 'opening';
            hand.animProgress = 0;
            hand.velocityHistory = [];

            const speed = Math.sqrt(throwVel.vx ** 2 + throwVel.vy ** 2);
            statusEl.textContent = speed > 2 ? 'Брошен: Миньон!' : 'Отпущен: Миньон';
        } else if (selection.active) {
            selection.active = false;
            const selW = Math.abs(selection.endX - selection.startX);
            const selH = Math.abs(selection.endY - selection.startY);
            if (selW > 5 || selH > 5) {
                const tl = screenToCanvas(
                    Math.min(selection.startX, selection.endX),
                    Math.min(selection.startY, selection.endY)
                );
                const br = screenToCanvas(
                    Math.max(selection.startX, selection.endX),
                    Math.max(selection.startY, selection.endY)
                );
                hand.selectedMinions = [];
                for (let i = 0; i < minions.length; i++) {
                    const m = minions[i];
                    if (m.state !== 'wandering' && m.state !== 'paused') continue;
                    const s = worldToScreen(m.ix, m.iy);
                    const mx = s.x;
                    const my = s.y - (MINION_H * PIXEL_SCALE) / 2;
                    if (mx >= tl.x && mx <= br.x && my >= tl.y && my <= br.y) {
                        hand.selectedMinions.push(i);
                    }
                }
                if (hand.selectedMinions.length > 0) {
                    hand.grabbedFlag = true;
                    hand.state = 'closing';
                    hand.animProgress = 0;
                    if (flag.state === 'placed') {
                        flag.state = 'docked';
                        for (const m of minions) {
                            if (m.state === 'wandering' || m.state === 'paused') {
                                pickNewMinionTarget(m);
                            }
                        }
                    }
                    statusEl.textContent = `Выделено ${hand.selectedMinions.length} миньон(а) — кликни чтобы поставить флаг`;
                }
            }
        }
    });

    // Зум камеры: Z — отдалить, X — приблизить, C — сброс
    // Рестарт карты: R
    window.addEventListener('keydown', (e) => {
        if (e.key === 'z' || e.key === 'я') {
            camera.targetZoom = Math.max(camera.targetZoom * 0.9, 0.2);
        } else if (e.key === 'x' || e.key === 'ч') {
            camera.targetZoom = Math.min(camera.targetZoom * 1.1, 3.0);
        } else if (e.key === 'c' || e.key === 'с') {
            camera.targetZoom = 1.0;
        } else if (e.key === 'r' || e.key === 'к') {
            restartMap();
        }
    });

    // ============================================================
    //  РЕСТАРТ КАРТЫ
    // ============================================================
    function restartMap() {
        // Сброс предметов на начальные позиции
        items.length = 0;
        for (const pos of INITIAL_POSITIONS) {
            items.push(createItem(pos.type, pos.ix, pos.iy));
        }

        // Сброс миньонов
        minions.length = 0;
        for (const pos of INITIAL_MINION_POSITIONS) {
            minions.push(createMinion(pos.ix, pos.iy));
        }

        // Сброс флага
        flag.state = 'docked';
        flag.ix = 0;
        flag.iy = 0;
        flag.iz = 0;

        // Сброс руки
        hand.grabbedItem = null;
        hand.grabbedMinion = null;
        hand.grabbedFlag = false;
        hand.state = 'open';
        hand.animProgress = 0;
        hand.velocityHistory = [];

        // Сброс камеры
        camera.zoom = 1.0;
        camera.targetZoom = 1.0;

        // Сброс тряски
        screenShake.intensity = 0;
        screenShake.offsetX = 0;
        screenShake.offsetY = 0;

        // Сброс наведения
        hoveredItem = null;
        hoveredMinion = null;
        selection.active = false;

        // Сброс shake-детектора, выделения и эффекта флага
        hand.shakeHistory = [];
        hand.prevScreenXForShake = 0;
        hand.selectedMinions = [];
        flagEffect.active = false;

        statusEl.textContent = 'Карта перезапущена!';
    }

    // ============================================================
    //  КОЛЛИЗИИ МЕЖДУ ПРЕДМЕТАМИ
    // ============================================================
    function resolveItemCollisions() {
        for (let i = 0; i < items.length; i++) {
            for (let j = i + 1; j < items.length; j++) {
                const a = items[i];
                const b = items[j];

                // Предметы в руке не участвуют в коллизиях
                if (a.state === 'carried' || a.state === 'lifting') continue;
                if (b.state === 'carried' || b.state === 'lifting') continue;

                const typeA = ITEM_TYPES[a.type];
                const typeB = ITEM_TYPES[b.type];
                const minDist = typeA.radius + typeB.radius;

                // Проверяем высоту — сталкиваются только если на одном уровне
                if (Math.abs(a.iz - b.iz) > minDist * 0.5) continue;

                const dx = b.ix - a.ix;
                const dy = b.iy - a.iy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist >= minDist || dist < 0.0001) continue;

                // Нормаль столкновения
                const nx = dx / dist;
                const ny = dy / dist;

                // Раздвигаем предметы пропорционально массам
                const overlap = minDist - dist;
                const totalMass = typeA.mass + typeB.mass;
                a.ix -= nx * overlap * (typeB.mass / totalMass);
                a.iy -= ny * overlap * (typeB.mass / totalMass);
                b.ix += nx * overlap * (typeA.mass / totalMass);
                b.iy += ny * overlap * (typeA.mass / totalMass);

                // Импульс только если предметы сближаются
                const dvx = b.vx - a.vx;
                const dvy = b.vy - a.vy;
                const dot = dvx * nx + dvy * ny;
                if (dot >= 0) continue;

                const restitution = Math.min(typeA.bounciness, typeB.bounciness);
                const impulse = -(1 + restitution) * dot / totalMass;

                a.vx -= impulse * typeB.mass * nx;
                a.vy -= impulse * typeB.mass * ny;
                b.vx += impulse * typeA.mass * nx;
                b.vy += impulse * typeA.mass * ny;

                // Будим неподвижные предметы
                if (a.state === 'idle' || a.state === 'settling') {
                    a.state = 'sliding';
                    a.stateTime = 0;
                }
                if (b.state === 'idle' || b.state === 'settling') {
                    b.state = 'sliding';
                    b.stateTime = 0;
                }

                // Тряска экрана при сильном ударе тяжёлых предметов
                const impactSpeed = Math.abs(dot);
                if (impactSpeed > 2.0) {
                    triggerScreenShake(Math.min(typeA.mass, typeB.mass) * impactSpeed * 0.2);
                }
            }
        }
    }

    // ============================================================
    //  ОБНОВЛЕНИЕ
    // ============================================================
    function update(dt) {
        // Плавное движение руки к курсору
        const lerp = 1 - Math.pow(0.001, dt);
        hand.screenX += (mouseX - hand.screenX) * lerp;
        hand.screenY += (mouseY - hand.screenY) * lerp;

        // Конвертируем позицию руки в изометрические координаты
        const iso = screenToIso(hand.screenX, hand.screenY);
        hand.isoX = iso.x;
        hand.isoY = iso.y;

        // Трекинг скорости руки для расчёта броска
        if (dt > 0) {
            const hvx = (hand.isoX - hand.prevIsoX) / dt;
            const hvy = (hand.isoY - hand.prevIsoY) / dt;
            hand.velocityHistory.push({ vx: hvx, vy: hvy, dt: dt });
            if (hand.velocityHistory.length > VELOCITY_HISTORY) {
                hand.velocityHistory.shift();
            }
        }
        hand.prevIsoX = hand.isoX;
        hand.prevIsoY = hand.isoY;

        // Детектор встряхивания флага
        if (hand.grabbedFlag) {
            const dsx = hand.screenX - hand.prevScreenXForShake;
            const now = performance.now();
            if (Math.abs(dsx) > 2) {
                hand.shakeHistory.push({ dx: dsx, t: now });
            }
            // Держим только последние 0.6с
            const cutoff = now - 600;
            while (hand.shakeHistory.length > 0 && hand.shakeHistory[0].t < cutoff) {
                hand.shakeHistory.shift();
            }
            // Считаем смены направления
            let signChanges = 0;
            let prevSign = 0;
            for (const h of hand.shakeHistory) {
                const s = Math.sign(h.dx);
                if (prevSign !== 0 && s !== prevSign) signChanges++;
                prevSign = s;
            }
            if (signChanges >= 5) {
                dismissFlag();
            }
        }
        hand.prevScreenXForShake = hand.screenX;

        // Обновление эффекта растворения флага
        if (flagEffect.active) {
            flagEffect.t += dt;
            if (flagEffect.t >= flagEffect.duration) {
                flagEffect.active = false;
            } else {
                for (const p of flagEffect.particles) {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 120 * dt; // гравитация частиц
                }
            }
        }

        // Анимация захвата/отпускания
        if (hand.state === 'closing' || hand.state === 'opening') {
            hand.animProgress += dt * 5;
            if (hand.animProgress >= 1) {
                hand.animProgress = 1;
                hand.state = hand.state === 'closing' ? 'closed' : 'open';
            }
        }

        // Обновляем физику всех предметов
        for (let i = 0; i < items.length; i++) {
            updateItemPhysics(items[i], dt);
        }

        // Коллизии между предметами
        resolveItemCollisions();

        // Обновляем миньонов
        for (let i = 0; i < minions.length; i++) {
            updateMinion(minions[i], dt);
        }

        // Проверяем наведение на предметы и миньонов
        hoveredItem = null;
        hoveredMinion = null;
        if (hand.grabbedItem === null && hand.grabbedMinion === null && !hand.grabbedFlag) {
            let minDist = 1.5;
            for (let i = 0; i < items.length; i++) {
                const it = items[i];
                if (it.state === 'carried' || it.state === 'lifting') continue;
                if (it.iz > 2.0) continue;
                const dx = hand.isoX - it.ix;
                const dy = hand.isoY - it.iy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) {
                    minDist = dist;
                    hoveredItem = i;
                    hoveredMinion = null;
                }
            }
            for (let i = 0; i < minions.length; i++) {
                const m = minions[i];
                if (m.state === 'carried' || m.state === 'lifting') continue;
                if (m.iz > 2.0) continue;
                const dx = hand.isoX - m.ix;
                const dy = hand.isoY - m.iy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) {
                    minDist = dist;
                    hoveredItem = null;
                    hoveredMinion = i;
                }
            }
        }

        // Тряска экрана
        updateScreenShake(dt);

        // Плавный зум
        camera.zoom += (camera.targetZoom - camera.zoom) * Math.min(1, dt * 8);

        // Обновляем статус
        const nothingHeld = hand.grabbedItem === null && hand.grabbedMinion === null && !hand.grabbedFlag;
        if (hand.grabbedFlag) {
            statusEl.textContent = 'Флаг в руке — кликни чтобы установить';
        } else if (nothingHeld && hoveredItem !== null) {
            statusEl.textContent = `Навести: ${ITEM_TYPES[items[hoveredItem].type].name} [зажми ЛКМ]`;
        } else if (nothingHeld && hoveredMinion !== null) {
            statusEl.textContent = 'Навести: Миньон [зажми ЛКМ]';
        } else if (nothingHeld) {
            statusEl.textContent = 'Рука открыта';
        }
    }

    // ============================================================
    //  ТЕНЬ (с учётом высоты)
    // ============================================================
    function drawShadow(sx, sy, w, h) {
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(sx, sy + 8, w * PIXEL_SCALE * 0.5, h * PIXEL_SCALE * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    function drawItemShadow(sx, sy, w, h, height) {
        ctx.save();
        const heightFactor = 1 / (1 + height * 0.8);
        const alpha = 0.25 * heightFactor;
        const scaleW = w * PIXEL_SCALE * 0.5 * heightFactor;
        const scaleH = h * PIXEL_SCALE * 0.2 * heightFactor;

        ctx.globalAlpha = Math.max(alpha, 0.05);
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(sx, sy + 8, Math.max(scaleW, 3), Math.max(scaleH, 1.5), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // ============================================================
    //  ПОДСВЕТКА
    // ============================================================
    function drawHighlight(sx, sy, w, h) {
        ctx.save();
        const time = performance.now() / 500;
        ctx.globalAlpha = 0.3 + 0.15 * Math.sin(time);
        ctx.strokeStyle = '#ffff44';
        ctx.lineWidth = 2;
        const pw = w * PIXEL_SCALE;
        const ph = h * PIXEL_SCALE;
        ctx.strokeRect(sx - 4, sy - 4, pw + 8, ph + 8);
        ctx.restore();
    }

    // ============================================================
    //  ОТРИСОВКА
    // ============================================================
    function drawItem(item, index) {
        const type = ITEM_TYPES[item.type];
        const s = worldToScreen(item.ix, item.iy);

        // Тень на земле (с учётом высоты)
        drawItemShadow(s.x, s.y, type.w, type.h, item.iz);

        // Для переносимых/поднимаемых предметов — рисуем прямо в хватке руки
        if (item.state === 'carried' || item.state === 'lifting') {
            const time = performance.now() / 300;
            const wobbleX = hand.grabbedItem !== null ? Math.sin(time) * 1.5 : 0;
            const wobbleY = hand.grabbedItem !== null ? Math.cos(time * 1.3) * 1 : 0;

            // Центр хватки закрытой руки: примерно ряд 5-6 спрайта руки
            const gripOffsetY = -8; // предмет чуть выше центра ладони
            const lerpT = item.state === 'lifting' ? (1 - Math.pow(1 - item.liftProgress, 2)) : 1;

            // Стартовая позиция (на земле) и целевая (в руке)
            const canvasPos = screenToCanvas(hand.screenX, hand.screenY);
            const groundOx = s.x - (type.w * PIXEL_SCALE) / 2;
            const groundOy = s.y - (type.h * PIXEL_SCALE) - 4;
            const handOx = canvasPos.x - (type.w * PIXEL_SCALE) / 2 + wobbleX;
            const handOy = canvasPos.y - (type.h * PIXEL_SCALE) / 2 + gripOffsetY + wobbleY;

            const ox = groundOx + (handOx - groundOx) * lerpT;
            const oy = groundOy + (handOy - groundOy) * lerpT;

            drawPixelArt(ox, oy, type.pixels, PIXEL_SCALE);
            return;
        }

        // Смещение по высоте (для летящих/отскакивающих)
        const heightOffset = item.iz * HEIGHT_TO_SCREEN;

        const ox = s.x - (type.w * PIXEL_SCALE) / 2;
        const oy = s.y - (type.h * PIXEL_SCALE) - 4 - heightOffset;

        // Подсветка если наведено
        if (index === hoveredItem) {
            drawHighlight(ox, oy, type.w, type.h);
        }

        // Предмет
        drawPixelArt(ox, oy, type.pixels, PIXEL_SCALE);
    }

    // Пересчёт screen-координат в координаты зумированного canvas
    function screenToCanvas(sx, sy) {
        return {
            x: (sx - canvas.width / 2) / camera.zoom + canvas.width / 2,
            y: (sy - canvas.height / 2) / camera.zoom + canvas.height / 2,
        };
    }

    function drawHand() {
        const canvasPos = screenToCanvas(hand.screenX, hand.screenY);
        const sx = canvasPos.x;
        const sy = canvasPos.y;

        // Тень руки
        drawShadow(sx, sy + 15, 10, 11);

        // Определяем какие пиксели рисовать в зависимости от состояния
        let pixels;
        const handW = 10;
        const handH = 12;

        if (hand.state === 'open') {
            pixels = HAND_OPEN_PIXELS;
        } else if (hand.state === 'closed') {
            pixels = HAND_CLOSED_PIXELS;
        } else {
            // Анимация — интерполяция между открытой и закрытой
            const t = hand.state === 'closing' ? hand.animProgress : 1 - hand.animProgress;
            // Используем ближайший кадр
            pixels = t < 0.5 ? HAND_OPEN_PIXELS : HAND_CLOSED_PIXELS;
        }

        // Рисуем руку центрируя на курсоре
        const ox = sx - (handW * PIXEL_SCALE) / 2;
        const oy = sy - (handH * PIXEL_SCALE) / 2 - 20; // поднимаем руку над поверхностью

        // Если что-то захвачено, немного покачиваем
        let wobbleX = 0, wobbleY = 0;
        if (hand.grabbedItem !== null) {
            const time = performance.now() / 300;
            wobbleX = Math.sin(time) * 1.5;
            wobbleY = Math.cos(time * 1.3) * 1;
        }

        drawPixelArt(ox + wobbleX, oy + wobbleY, pixels, PIXEL_SCALE);
    }

    // ============================================================
    //  СОРТИРОВКА ПО ГЛУБИНЕ
    // ============================================================
    function getDepth(isoX, isoY) {
        return isoX + isoY;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.imageSmoothingEnabled = false;

        // Зум камеры + тряска экрана
        ctx.save();
        ctx.translate(canvas.width / 2 + screenShake.offsetX, canvas.height / 2 + screenShake.offsetY);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-canvas.width / 2, -canvas.height / 2);

        // Пол
        drawFloor();

        // Собираем все объекты для сортировки по глубине
        const renderList = [];

        // Предметы (не в состоянии carried/lifting — те рисуются с рукой)
        for (let i = 0; i < items.length; i++) {
            if (items[i].state === 'carried' || items[i].state === 'lifting') continue;
            renderList.push({
                type: 'item',
                index: i,
                depth: getDepth(items[i].ix, items[i].iy)
            });
        }

        // Миньоны
        for (let i = 0; i < minions.length; i++) {
            if (minions[i].state === 'carried' || minions[i].state === 'lifting') continue;
            renderList.push({
                type: 'minion',
                index: i,
                depth: getDepth(minions[i].ix, minions[i].iy)
            });
        }

        // Флаг на поле
        if (flag.state === 'placed') {
            renderList.push({
                type: 'flag',
                depth: getDepth(flag.ix, flag.iy)
            });
        }

        // Рука (и захваченный объект рисуются вместе)
        renderList.push({
            type: 'hand',
            depth: getDepth(hand.isoX, hand.isoY)
        });

        // Сортируем по глубине
        renderList.sort((a, b) => a.depth - b.depth);

        // Рисуем
        for (const obj of renderList) {
            if (obj.type === 'item') {
                drawItem(items[obj.index], obj.index);
            } else if (obj.type === 'minion') {
                drawMinion(minions[obj.index], obj.index);
            } else if (obj.type === 'flag') {
                drawFlagInWorld(false);
            } else if (obj.type === 'hand') {
                if (hand.grabbedItem !== null) {
                    drawItem(items[hand.grabbedItem], hand.grabbedItem);
                } else if (hand.grabbedMinion !== null) {
                    drawMinion(minions[hand.grabbedMinion], hand.grabbedMinion);
                } else if (hand.grabbedFlag) {
                    // Флаг в руке — рисуем у курсора
                    const cp = screenToCanvas(hand.screenX, hand.screenY);
                    const wobbleX = Math.sin(performance.now() / 300) * 1.5;
                    const wobbleY = Math.cos(performance.now() / 230) * 1;
                    drawFlagAt(
                        cp.x - (FLAG_W * PIXEL_SCALE) / 2 + wobbleX,
                        cp.y - (FLAG_H * PIXEL_SCALE) / 2 - 8 + wobbleY,
                        false
                    );
                }
                drawHand();
            }
        }

        // Эффект растворения флага
        if (flagEffect.active) {
            const alpha = Math.pow(1 - flagEffect.t / flagEffect.duration, 1.5);
            ctx.save();
            ctx.globalAlpha = alpha;
            for (const p of flagEffect.particles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(
                    Math.floor(flagEffect.originX + p.x),
                    Math.floor(flagEffect.originY + p.y),
                    PIXEL_SCALE, PIXEL_SCALE
                );
            }
            ctx.restore();
        }

        ctx.restore();

        // Рамка выделения (screen space, поверх всего)
        if (selection.active) {
            const sx = Math.min(selection.startX, selection.endX);
            const sy = Math.min(selection.startY, selection.endY);
            const sw = Math.abs(selection.endX - selection.startX);
            const sh = Math.abs(selection.endY - selection.startY);
            ctx.save();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#ffff44';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.8;
            ctx.strokeRect(sx, sy, sw, sh);
            ctx.fillStyle = '#ffff44';
            ctx.globalAlpha = 0.06;
            ctx.fillRect(sx, sy, sw, sh);
            ctx.restore();
        }

        // Курсор-точка (вне зума и тряски — стабильный)
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(mouseX - 1, mouseY - 1, 3, 3);

        // Индикатор зума
        if (Math.abs(camera.zoom - 1.0) > 0.01) {
            ctx.fillStyle = '#aab';
            ctx.font = '12px monospace';
            ctx.fillText(`Зум: ${Math.round(camera.zoom * 100)}%`, 16, canvas.height - 16);
        }
    }

    // ============================================================
    //  GAME LOOP
    // ============================================================
    let lastTime = performance.now();

    function gameLoop(now) {
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        update(dt);
        render();

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
