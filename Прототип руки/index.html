<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изометрическая рука — Прототип</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; cursor: none; }
        canvas { display: block; }
        #ui {
            position: fixed; top: 16px; left: 16px;
            color: #aab; font-family: monospace; font-size: 14px;
            pointer-events: none; user-select: none;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>ЛКМ — схватить/бросить | Тяни на пустом месте — выделить миньонов</div>
        <div id="status">Рука открыта</div>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
