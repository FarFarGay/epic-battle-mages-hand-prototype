<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wandering Spire — Баланс Заклинаний 3×3×3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08080f; color: #fff; font-family: 'Cormorant Garamond', serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 36px 20px; }
  h1 { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 900; letter-spacing: 3px; text-align: center; text-transform: uppercase; color: rgba(255,255,255,0.8); margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.25); letter-spacing: 2px; margin-bottom: 36px; }
  .panel { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 24px; margin-bottom: 28px; }
  .axis { margin-bottom: 18px; }
  .axis:last-child { margin-bottom: 0; }
  .axis-label { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .axis-label span:first-child { font-size: 11px; font-family: 'Cinzel', serif; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 2px; }
  .axis-label span:last-child { font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 1px; }
  .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 10px 18px; border-radius: 10px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 14px; font-weight: 400; transition: all 0.25s ease; border: 2px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.4); }
  .pill:hover { filter: brightness(1.12); }
  .pill.active { font-weight: 700; }
  .card { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 28px; margin-bottom: 24px; position: relative; overflow: hidden; }
  .card-glow { position: absolute; top: 0; left: 0; right: 0; height: 120px; pointer-events: none; }
  .card-inner { position: relative; z-index: 1; }
  .synergy-badge { border-radius: 10px; padding: 10px 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
  .spell-name { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 6px; }
  .spell-combo { font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 16px; letter-spacing: 1px; }
  .spell-desc { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 12px; max-width: 600px; }
  .spell-tactical { font-size: 13px; font-weight: 600; margin-bottom: 24px; font-family: 'Cinzel', serif; letter-spacing: 0.5px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .bar-wrap { margin-bottom: 12px; }
  .bar-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bar-label { font-size: 11px; color: rgba(255,255,255,0.45); font-family: 'Cormorant Garamond', serif; text-transform: uppercase; letter-spacing: 1px; }
  .bar-value { font-size: 15px; font-family: 'Cinzel', serif; font-weight: 700; }
  .bar-bg { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .section-label { font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-family: 'Cinzel', serif; }
  .tiles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 16px; }
  .tile-btn { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 4px; text-align: center; cursor: pointer; }
  .tile-btn.active { border-color: rgba(255,255,255,0.2); }
  .tile-name { font-size: 10px; color: rgba(255,255,255,0.35); }
  .tile-dmg { font-size: 15px; font-family: 'Cinzel', serif; font-weight: 700; }
  .tile-mult { font-size: 10px; }
  .tile-effect-box { border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 600; }
  .formula { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 8px; line-height: 1.6; }
  .toggle-btn { width: 100%; padding: 14px; border-radius: 10px; cursor: pointer; margin-bottom: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px; }
  .toggle-btn:hover { filter: brightness(1.12); }
  .table-wrap { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
  .sort-bar { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
  .sort-label { font-size: 11px; color: rgba(255,255,255,0.3); }
  .sort-btn { padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid transparent; background: transparent; color: rgba(255,255,255,0.35); font-family: 'Cinzel', serif; }
  .sort-btn.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: white; }
  .combo-list { max-height: 600px; overflow-y: auto; }
  .combo-row { display: grid; grid-template-columns: 180px 1fr 60px 60px 50px 100px; gap: 8px; align-items: center; padding: 10px 16px; border: none; border-bottom: 1px solid rgba(255,255,255,0.03); width: 100%; text-align: left; cursor: pointer; background: transparent; color: white; font-family: 'Cormorant Garamond', serif; font-size: 12px; }
  .combo-row:hover { background: rgba(255,255,255,0.03); }
  .combo-name { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; }
  .combo-tactical { font-size: 11px; color: rgba(255,255,255,0.3); }
  .combo-dmg { font-size: 13px; font-family: 'Cinzel', serif; font-weight: 700; color: rgba(255,255,255,0.7); text-align: center; }
  .combo-mana { font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; }
  .combo-dpm { font-size: 12px; text-align: center; }
  .combo-syn { font-size: 11px; color: #C9A227; font-family: 'Cinzel', serif; text-align: right; }
  .mult-badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 6px; padding: 4px 10px; font-size: 12px; margin: 3px; }
  .mult-label { color: rgba(255,255,255,0.5); font-family: 'Cormorant Garamond', serif; }
  .mult-val { font-family: 'Cinzel', serif; font-weight: 700; }
  @media (max-width: 700px) {
    .stats-grid { grid-template-columns: 1fr; }
    .combo-row { grid-template-columns: 140px 1fr 50px 50px; }
    .combo-row > :nth-child(5), .combo-row > :nth-child(6) { display: none; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const FORMS = [
  { id:"arrow", name:"Стрела", area:1, dmgMult:1.5, manaMult:1.0, range:12, desc:"Далеко, точно, одна цель." },
  { id:"shell", name:"Снаряд", area:3, dmgMult:1.0, manaMult:1.2, range:8, desc:"Взрывается при попадании." },
  { id:"shot", name:"Дробь", area:6, dmgMult:0.4, manaMult:0.8, range:6, desc:"Россыпь осколков, большая площадь." },
];
const ELEMENTS = [
  { id:"fire", name:"Огонь", baseMult:1.0, color:"#e74c3c" },
  { id:"water", name:"Вода", baseMult:1.0, color:"#3498db" },
  { id:"earth", name:"Земля", baseMult:1.0, color:"#8B7355" },
];
const INTENTS = [
  { id:"destroy", name:"Уничтожить", baseDmg:200, baseMana:80, icon:"💥" },
  { id:"protect", name:"Защитить", baseDmg:0, baseMana:50, icon:"🛡️" },
  { id:"see", name:"Увидеть", baseDmg:0, baseMana:35, icon:"👁️" },
];
const TILES = [
  { id:"forest", name:"Лес" },{ id:"water", name:"Вода" },{ id:"stone", name:"Камень" },
  { id:"village", name:"Деревня" },{ id:"ice", name:"Лёд" },{ id:"plain", name:"Равнина" },
];
const TILE_MULTS = {
  fire:{forest:1.8,water:0.3,stone:1.0,village:1.8,ice:0.5,plain:1.0},
  water:{forest:1.0,water:1.0,stone:0.3,village:1.8,ice:1.8,plain:1.0},
  earth:{forest:0.5,water:1.8,stone:1.8,village:1.0,ice:0.5,plain:1.0},
};
const TILE_EFFECTS = {
  fire:{forest:"Пожар (+2 тайла)",water:"Пар (туман)",stone:"Плавление",village:"Разрушение",ice:"Таяние → вода",plain:"Выжигание"},
  water:{forest:"Рост (+ресурсы)",water:"Наводнение",stone:"Эрозия (путь)",village:"Урожай (+лояльн.)",ice:"Расширение льда",plain:"Болото (замедл.)"},
  earth:{forest:"Корни (стена)",water:"Болото (замедл.)",stone:"Усиление (+деф)",village:"Укрепление",ice:"Завалка",plain:"Каменная стена"},
};
const SPELLS = {
  arrow_fire_destroy:{name:"Огненная стрела",desc:"Точечный удар, высокий урон. При попадании в лес — поджигает, огонь ползёт на соседние тайлы. Промахнулся — пожар может пойти к тебе.",tactical:"Снайперский удар по замку или постройке"},
  shell_fire_destroy:{name:"Огненная бомба",desc:"Взрывается при попадании, поджигает зону. Основной боевой снаряд. Деревню уничтожает полностью. На воде — пар и туман.",tactical:"Главный рабочий снаряд для артдуэли"},
  shot_fire_destroy:{name:"Огненный дождь",desc:"Россыпь мелких огненных снарядов. Каждый слабый, но на лесу — всё загорится. Плох против каменных укреплений.",tactical:"Выжигание региона перед наступлением"},
  arrow_fire_protect:{name:"Огненный столб",desc:"Горящая точка-преграда. Блокирует один проход на несколько ходов. Враг не пройдёт, но и ты тоже.",tactical:"Закупорка узких мест на карте"},
  shell_fire_protect:{name:"Огненная стена",desc:"Полоса огня. Бронированные миньоны пройдут с потерями, голые сгорят. Фильтр а не стена.",tactical:"Замедление и фильтрация вражеской армии"},
  shot_fire_protect:{name:"Огненное поле",desc:"Россыпь мелких очагов. Вся зона — минное поле. Враг проходит но несёт потери на каждом тайле.",tactical:"Зона контроля, изматывание армии"},
  arrow_fire_see:{name:"Сигнальная ракета",desc:"Летит далеко, освещает точку и радиус вокруг. Стреляешь наугад — увидел замок или нет. Дёшево и быстро.",tactical:"Базовая точечная разведка"},
  shell_fire_see:{name:"Осветительная бомба",desc:"Взрыв освещает среднюю зону. В лесу — пожар освещает дальше. Побочный бонус: поджёг и увидел.",tactical:"Разведка с побочным уроном"},
  shot_fire_see:{name:"Фейерверк",desc:"Россыпь искр по большой площади. Раскрывает огромную зону ненадолго. Враг тоже видит — понимает что его нашли.",tactical:"Раскрытие площади перед ударом"},
  arrow_water_destroy:{name:"Ледяная стрела",desc:"Точечный удар, замораживает цель. На воде — создаёт лёд. Деревню парализует на несколько ходов.",tactical:"Точечная заморозка цели"},
  shell_water_destroy:{name:"Водяная бомба",desc:"Затапливает зону. На равнине — болото. Деревню разрушает. Против каменного замка слабо — вода стекает.",tactical:"Затопление зоны, создание болот"},
  shot_water_destroy:{name:"Ледяной град",desc:"Россыпь ледяных осколков. Замедляет. Зона покрывается льдом. Миньоны скользят, теряют строй.",tactical:"Массовое замедление вражеской армии"},
  arrow_water_protect:{name:"Ледяной шип",desc:"Ледяная глыба. Враг обходит или ломает. Тает со временем. Дёшево — хорош для одного прохода.",tactical:"Временная точечная блокировка"},
  shell_water_protect:{name:"Ледяная стена",desc:"Стена льда. Прочнее огненной, не наносит урон. На воде — замораживает водоём, создаёт мост. И стена и путь.",tactical:"Прочный барьер или создание моста"},
  shot_water_protect:{name:"Ледяной каток",desc:"Площадь покрывается льдом. Не стена а поверхность. Все скользят — враг и свои. Обоюдоострое.",tactical:"Хаотизация передвижения в зоне"},
  arrow_water_see:{name:"Водяной зонд",desc:"Растекается вдоль водных тайлов. На реке — видишь всё вдоль. На суше — мало. Мощный если знаешь где вода.",tactical:"Разведка по водным путям"},
  shell_water_see:{name:"Дождевое облако",desc:"Зона дождя. После рассеивания — лужи, по ним видны следы юнитов. Остаточная разведка.",tactical:"Разведка со следами"},
  shot_water_see:{name:"Туманный залп",desc:"Туман. Видишь контуры врага, но враг получает укрытие. Разведка с ценой.",tactical:"Обнаружение позиций ценой укрытия врагу"},
  arrow_earth_destroy:{name:"Каменный болт",desc:"Чистая кинетика. Макс. урон по бронированным целям. Пробивает стены замка. Просто дырка.",tactical:"Лучший снаряд против укреплённого замка"},
  shell_earth_destroy:{name:"Землетрясение",desc:"Проламывает землю, яма. Всё падает вниз. Яма — непроходимый тайл. Уничтожил + преграда.",tactical:"Разрушение + создание преграды"},
  shot_earth_destroy:{name:"Камнепад",desc:"Россыпь булыжников. Каждый слабый но остаётся. Ровная местность → завал. Не убил но перегородил.",tactical:"Массовое замедление через завалы"},
  arrow_earth_protect:{name:"Каменный столб",desc:"Каменная колонна. Прочнее льда, не тает. Постоянное препятствие. Можно строить стены по столбу.",tactical:"Постоянная точечная блокировка"},
  shell_earth_protect:{name:"Каменная стена",desc:"Стена из земли. Самый прочный барьер. Не горит, не тает. Но ты тоже не пройдёшь.",tactical:"Самая мощная защита, необратимая"},
  shot_earth_protect:{name:"Каменная насыпь",desc:"Россыпь камней → возвышенность. Не стена а холм. Миньоны на ней получают бонус к обзору и обороне.",tactical:"Создание укреплённой позиции"},
  arrow_earth_see:{name:"Сейсмозонд",desc:"Вонзается в землю, слушает вибрации. Показывает движение юнитов через стены. Не видишь что — видишь что кто-то идёт.",tactical:"Обнаружение движения через препятствия"},
  shell_earth_see:{name:"Тектонический удар",desc:"Сотрясает зону. Раскрывает ловушки, подземные ходы, замаскированные укрепления. Видишь инфраструктуру.",tactical:"Разведка скрытых построек и ловушек"},
  shot_earth_see:{name:"Каменные маячки",desc:"Камни-датчики по площади. Юнит наступил — обнаружен. Пассивное минное поле, только вместо взрыва — пинг.",tactical:"Долговременная пассивная система обнаружения"},
};
const SYNERGIES = {
  arrow_fire_destroy:{name:"Драконье Копьё",bonus:1.2},
  shell_fire_destroy:{name:"Напалм",bonus:1.2},
  shot_fire_destroy:{name:"Армагеддон",bonus:1.2},
  shell_water_destroy:{name:"Потоп",bonus:1.2},
  shot_water_destroy:{name:"Ледниковый Период",bonus:1.2},
  arrow_earth_destroy:{name:"Пробойник",bonus:1.2},
  shell_earth_protect:{name:"Крепость",bonus:1.2},
  shell_water_protect:{name:"Ледяная Крепость",bonus:1.2},
  shot_earth_see:{name:"Сеть Стража",bonus:1.2},
};

let state = { form:"arrow", elem:"fire", intent:"destroy", tile:"plain", showAll:false, sortBy:"name" };

function calc() {
  const f = FORMS.find(x=>x.id===state.form);
  const e = ELEMENTS.find(x=>x.id===state.elem);
  const i = INTENTS.find(x=>x.id===state.intent);
  const key = `${state.form}_${state.elem}_${state.intent}`;
  const sp = SPELLS[key]||{};
  const syn = SYNERGIES[key]||null;
  const synM = syn?syn.bonus:1.0;
  const tM = TILE_MULTS[state.elem][state.tile];
  const tE = TILE_EFFECTS[state.elem][state.tile];
  const dmg = Math.round(i.baseDmg*f.dmgMult*e.baseMult*tM*synM);
  const mana = Math.round(i.baseMana*f.manaMult);
  const dpm = mana>0&&dmg>0?Math.round((dmg/mana)*10)/10:0;
  return {f,e,i,sp,syn,synM,tM,tE,dmg,mana,dpm,key};
}

function allCombos() {
  const out=[];
  for(const f of FORMS) for(const e of ELEMENTS) for(const i of INTENTS) {
    const key=`${f.id}_${e.id}_${i.id}`;
    const sp=SPELLS[key]||{};
    const syn=SYNERGIES[key]||null;
    const synM=syn?syn.bonus:1.0;
    const dmg=Math.round(i.baseDmg*f.dmgMult*e.baseMult*synM);
    const mana=Math.round(i.baseMana*f.manaMult);
    const dpm=mana>0&&dmg>0?Math.round((dmg/mana)*10)/10:0;
    out.push({fId:f.id,eId:e.id,iId:i.id,form:f.name,elem:e.name,intent:i.name,name:sp.name||"—",tactical:sp.tactical||"",dmg,mana,dpm,synergy:syn?.name||"",eColor:e.color,key});
  }
  return out;
}

function render() {
  const c = calc();
  const combos = allCombos();
  const sorted = [...combos].sort((a,b)=>{
    if(state.sortBy==="dmg") return b.dmg-a.dmg;
    if(state.sortBy==="mana") return a.mana-b.mana;
    if(state.sortBy==="dpm") return b.dpm-a.dpm;
    return a.name.localeCompare(b.name);
  });

  function pills(items, sel, axis, colorOverride) {
    return items.map(it=>{
      const clr = it.color||colorOverride||"#888";
      const active = sel===it.id;
      return `<button class="pill${active?' active':''}" data-axis="${axis}" data-id="${it.id}" style="
        ${active?`background:${clr}18;border-color:${clr};color:${clr};box-shadow:0 0 16px ${clr}20;font-weight:700`:''}
      ">${it.icon?it.icon+' ':''}${it.name}</button>`;
    }).join('');
  }

  function bar(label, value, max, color, suffix='') {
    const pct = max>0?Math.min((value/max)*100,100):0;
    return `<div class="bar-wrap"><div class="bar-top"><span class="bar-label">${label}</span><span class="bar-value" style="color:${color}">${value}${suffix}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  }

  function tileGrid() {
    return TILES.map(t=>{
      const m=TILE_MULTS[state.elem][t.id];
      const d=Math.round(c.i.baseDmg*c.f.dmgMult*c.e.baseMult*m*c.synM);
      const active=t.id===state.tile;
      const clr=m>=1.5?"#27ae60":m<=0.5?"#e74c3c":"rgba(255,255,255,0.35)";
      return `<button class="tile-btn${active?' active':''}" data-tile="${t.id}" style="${active?`background:${c.e.color}12;border-color:${c.e.color}40`:''}"><div class="tile-name">${t.name}</div><div class="tile-dmg" style="color:${clr}">${d>0?d:'—'}</div><div class="tile-mult" style="color:${clr}">×${m}</div></button>`;
    }).join('');
  }

  function comboRows() {
    return sorted.map((co,i)=>{
      const active=co.key===c.key;
      const bg=active?`${co.eColor}10`:co.synergy?'rgba(201,162,39,0.05)':i%2===0?'transparent':'rgba(255,255,255,0.01)';
      const nc=active?co.eColor:'rgba(255,255,255,0.7)';
      const dc=co.dpm>=4?'#27ae60':co.dpm>=2?'#f39c12':'rgba(255,255,255,0.3)';
      return `<button class="combo-row" data-combo="${co.fId}_${co.eId}_${co.iId}" style="background:${bg}"><div><span class="combo-name" style="color:${nc}">${co.name}</span></div><div class="combo-tactical">${co.tactical}</div><div class="combo-dmg">${co.dmg>0?co.dmg:'—'}</div><div class="combo-mana">${co.mana}</div><div class="combo-dpm" style="color:${dc}">${co.dpm>0?co.dpm:'—'}</div><div class="combo-syn" style="font-weight:${co.synergy?700:400}">${co.synergy||''}</div></button>`;
    }).join('');
  }

  let html = `<h1>Баланс Заклинаний</h1><p class="sub">3 формы · 3 стихии · 3 намерения · 27 снарядов</p>`;

  html += `<div class="panel">
    <div class="axis"><div class="axis-label"><span>Форма</span><span>находишь на карте</span></div><div class="pills">${pills(FORMS,state.form,'form','#c0392b')}</div></div>
    <div class="axis"><div class="axis-label"><span>Стихия</span><span>всегда доступна</span></div><div class="pills">${pills(ELEMENTS,state.elem,'elem')}</div></div>
    <div class="axis"><div class="axis-label"><span>Намерение</span><span>тактический выбор</span></div><div class="pills">${pills(INTENTS,state.intent,'intent','#f39c12')}</div></div>
  </div>`;

  html += `<div class="card"><div class="card-glow" style="background:linear-gradient(180deg,${c.e.color}10,transparent)"></div><div class="card-inner">`;

  if(c.syn) html += `<div class="synergy-badge" style="background:${c.e.color}18;border:1px solid ${c.e.color}44"><span style="font-size:18px">⚡</span><span style="font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:${c.e.color}">${c.syn.name}</span><span style="font-size:12px;color:rgba(255,255,255,0.45)">+20%</span></div>`;

  html += `<div class="spell-name">${c.sp.name||'—'}</div>`;
  html += `<div class="spell-combo">${c.f.name} · ${c.e.name} · ${c.i.name}</div>`;
  html += `<div class="spell-desc">${c.sp.desc||''}</div>`;
  html += `<div class="spell-tactical" style="color:${c.e.color}">→ ${c.sp.tactical||''}</div>`;

  html += `<div class="stats-grid"><div>`;
  html += bar("Урон",c.dmg,500,c.e.color);
  html += bar("Мана",c.mana,120,"#3498db");
  html += bar("Урон за ману",c.dpm,8,"#2ecc71");
  html += bar("Площадь (тайлы)",c.f.area,6,"#f39c12");
  html += bar("Дальность",c.f.range,12,"#9b59b6");
  html += `<div class="formula">${c.i.baseDmg} × ${c.f.dmgMult} × ${c.e.baseMult} × ${c.tM}${c.syn?' × 1.2':''} = ${c.dmg}</div>`;
  html += `</div><div>`;
  html += `<div class="section-label">Тайл цели</div><div class="tiles-grid">${tileGrid()}</div>`;
  html += `<div class="section-label">Эффект на тайле</div>`;
  html += `<div class="tile-effect-box" style="background:${c.e.color}12;border:1px solid ${c.e.color}22;color:${c.e.color}">${c.tE}</div>`;
  html += `</div></div>`;
  html += `</div></div>`;

  html += `<button class="toggle-btn" id="toggleAll">${state.showAll?'Скрыть':'Показать'} все 27 комбинаций</button>`;

  if(state.showAll) {
    html += `<div class="table-wrap"><div class="sort-bar"><span class="sort-label">Сортировка:</span>`;
    [["name","Имя"],["dmg","Урон ↓"],["mana","Мана ↑"],["dpm","У/М ↓"]].forEach(([k,l])=>{
      html += `<button class="sort-btn${state.sortBy===k?' active':''}" data-sort="${k}">${l}</button>`;
    });
    html += `</div><div class="combo-list">${comboRows()}</div></div>`;
  }

  document.getElementById('app').innerHTML = html;

  // Event listeners
  document.querySelectorAll('.pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const axis=btn.dataset.axis, id=btn.dataset.id;
      if(axis==='form') state.form=id;
      else if(axis==='elem') state.elem=id;
      else if(axis==='intent') state.intent=id;
      render();
    });
  });
  document.querySelectorAll('.tile-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ state.tile=btn.dataset.tile; render(); });
  });
  document.getElementById('toggleAll')?.addEventListener('click',()=>{ state.showAll=!state.showAll; render(); });
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ state.sortBy=btn.dataset.sort; render(); });
  });
  document.querySelectorAll('.combo-row').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const [f,e,i]=btn.dataset.combo.split('_');
      state.form=f; state.elem=e; state.intent=i;
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

render();
</script>
</body>
</html>
